<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manim3 CrossFade Demo (CDN)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/manim3@1.0.1/dist/ManimPlayer.css">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0b;
      --surface: #111114;
      --surface2: #18181d;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.12);
      --accent: #7c6fef;
      --accent-dim: rgba(124, 111, 239, 0.18);
      --text: rgba(255, 255, 255, 0.88);
      --muted: rgba(255, 255, 255, 0.32);
      --muted2: rgba(255, 255, 255, 0.14);
      --green: #28c840;
      --yellow: #febc2e;
      --red: #ff5f57;
      --font-ui: 'Syne', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #player-container {
      width: 960px;
      max-width: 100%;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "gsap": "https://esm.sh/gsap@3.14.2",
      "gsap/": "https://esm.sh/gsap@3.14.2/",
      "earcut": "https://esm.sh/earcut@3.0.2",
      "jszip": "https://esm.sh/jszip@3.10.1",
      "three": "https://esm.sh/three@0.183.0",
      "three/": "https://esm.sh/three@0.183.0/"
    }
  }
  </script>
</head>
<body>
  <div id="player-container"></div>

  <script type="module">
    import { Scene, ManimPlayer, Square, Circle, crossFade, moveTo, fadeIn, fadeOut, smooth } from 'https://esm.sh/manim3@1.0.1';

    const container = document.getElementById('player-container');
    const scene = new Scene(container, {
      width: 960,
      height: 540,
      preserveDrawingBuffer: true
    });

    const player = new ManimPlayer(container, scene, {
      showExport: true,
      keyboardShortcuts: true
    });

    // Create square at left (starts invisible)
    const square = new Square({
      sideLength: 1.5,
      color: '#58C4DD',
      fillOpacity: 0.5,
    });
    square.position = [-3, 0, 0];
    square.opacity = 0;

    // Create circle (starts invisible)
    const circle = new Circle({
      radius: 1,
      color: '#FF6B6B',
      fillOpacity: 0.5,
    });
    circle.position = [3, 0, 0];
    circle.opacity = 0;

    // Add both to scene
    scene.add(square);
    scene.add(circle);

    // Build and run animation
    scene.scheduler.reset();

    // Phase 1: Fade in square
    scene.at(0).play(fadeIn(square, 1, smooth));

    // Phase 2: Move square to different position
    scene.at('+=0.5').play(moveTo(square, [0, 2, 0], 1, smooth));

    // Phase 3: Crossfade square and circle
    scene.at('+=0.5').play(crossFade(square, circle, 2, smooth));

    // Phase 4: Fade out circle
    scene.at('+=0.5').play(fadeOut(circle, 1, smooth));

    // Expose for debugging
    window.testScene = scene;
    window.player = player;

    console.log('[CrossFade Test] Animation loaded!');
    console.log('- Phase 1: Fade in square (1s)');
    console.log('- Phase 2: Move square up (+0.5s, 1s duration)');
    console.log('- Phase 3: Crossfade square→circle (+0.5s, 2s duration)');
    console.log('- Phase 4: Fade out circle (+0.5s, 1s duration)');
  </script>
</body>
</html>
