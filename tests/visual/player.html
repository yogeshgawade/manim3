<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManimPlayer Component Example</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../../src/player/ManimPlayer.css">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0b;
      --surface: #111114;
      --surface2: #18181d;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.12);
      --accent: #7c6fef;
      --accent-dim: rgba(124, 111, 239, 0.18);
      --text: rgba(255, 255, 255, 0.88);
      --muted: rgba(255, 255, 255, 0.32);
      --muted2: rgba(255, 255, 255, 0.14);
      --green: #28c840;
      --yellow: #febc2e;
      --red: #ff5f57;
      --font-ui: 'Syne', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
  </style>
</head>

<body>
  <div id="player-container"></div>

  <script type="module">
    import { Scene } from '../../src/scene/Scene';
    import { ManimPlayer } from '../../src/player/ManimPlayer.ts';

    const container = document.getElementById('player-container');
    const scene = new Scene(container, { width: 960, height: 540, preserveDrawingBuffer: true });
    
    const player = new ManimPlayer(container, scene, {
      showExport: true,
      keyboardShortcuts: true
    });

    window.testScene = scene;
    window.player = player;
  </script>

  <script type="module" src="./crossfade-test.ts"></script>
</body>

</html>
